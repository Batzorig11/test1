<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>minii toonii mashiin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" class="display" disabled />

      <div class="buttons">
        <button onclick="Raem()">AC</button>
        <button onclick="Mgl('/')">/</button>
        <button onclick="Mgl('*')">*</button>
        <button onclick="Mgl('-')">-</button>

        <button onclick="too('7')">7</button>
        <button onclick="too('8')">8</button>
        <button onclick="too('9')">9</button>
        <button onclick="Mgl('+')">+</button>

        <button onclick="too('4')">4</button>
        <button onclick="too('5')">5</button>
        <button onclick="too('6')">6</button>
        <button onclick="Mgl('=')">=</button>

        <button onclick="too('1')">1</button>
        <button onclick="too('2')">2</button>
        <button onclick="too('3')">3</button>
        <button onclick="Mgl('+/-')">+/-</button>

        <button onclick="too('0')" class="zero">0</button>
        <button onclick="Mgl('.')">.</button>
        <button onclick="Raem('clear')">clear</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
