<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RPS Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>✊ Rock Paper Scissors ✋</h1>

      <div class="choices">
        <button onclick="play('haich')" class="choice haich"></button>
        <button onclick="play('chuluu')" class="choice chuluu"></button>
        <button onclick="play('daawuu')" class="choice daawuu"></button>
      </div>

      <div class="arena">
        <div id="player" class="hand"></div>
        <div class="vs">VS</div>
        <div id="computer" class="hand"></div>
      </div>

      <div id="result"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
