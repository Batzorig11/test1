<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="choices">
        <button onclick="start(`haic`)" id="haic" class="choice">Rock</button>
        <button onclick="start(`daawuu`)" id="daawuu" class="choice">
          Paper
        </button>
        <button onclick="start(`chuluu`)" id="chuluu" class="choice">
          Scissors
        </button>
      </div>
      <div id="result"></div>

      <script src="main.js"></script>
    </div>
  </body>
</html>
